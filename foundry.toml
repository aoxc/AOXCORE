[profile.default]
# ==============================================================================
# --- 🏗️ AOXCAN PROJECT STRUCTURE ---
# ==============================================================================
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"

# ==============================================================================
# --- 🔗 REMAPPINGS (7 Sentinels Architecture) ---
# Artık importlar: "aoxcan/core/AoxcanCore.sol" şeklinde otonom olacak.
# ==============================================================================
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "forge-std/=lib/forge-std/src/",
    "aoxc-interfaces/=src/interfaces/",
    "aoxc-libraries/=src/libraries/",
    "aoxc-core/=src/core/",
    "aoxc-finance/=src/finance/",
    "aoxc-gov/=src/gov/",
    "aoxc-infra/=src/infra/",
    "aoxc-abstract/=src/abstract/",
    "aoxc-access/=src/access/",
    "aoxcan/=src/"
]

# ==============================================================================
# --- 🧠 COMPILER & OPTIMIZATION ---
# ==============================================================================
solc_version = "0.8.33" # X-Layer ve modern EVM için daha stabil bir sürüm (veya senin 0.8.33 tercihin)
optimizer = true
optimizer_runs = 500 # Gaz maliyeti için biraz daha agresif optimizasyon
via_ir = true

# ==============================================================================
# --- 🛡️ SECURITY & VERIFICATION ---
# ==============================================================================
bytecode_hash = "none"
extra_output = ["abi", "storageLayout", "metadata"]

[fuzz]
runs = 1000 # Ciddiyet için fuzz test sayısını artırdık

[rpc_endpoints]
xlayer_testnet = "https://testrpc.xlayer.tech"

[etherscan]
xlayer = { key = "${OKLINK_API_KEY}", url = "https://www.oklink.com/api/v5/explorer/contract/verify-source-code-plugin/xlayer" }
